# Portainer Stack — PixelCoder
# Deploy via Portainer > Stacks > Add Stack > Web editor
# Set environment variables in Portainer's stack env section.
#
# Image references point to ghcr.io/sidcom-ab/pixelcoder-*
# Built automatically by GitHub Actions on push to main/master.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pixelcoder}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in stack environment}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: ghcr.io/sidcom-ab/pixelcoder-web:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-pixelcoder}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
    command: npx knex migrate:latest
    restart: "no"

  web:
    image: ghcr.io/sidcom-ab/pixelcoder-web:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-pixelcoder}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=3000
      - NODE_ENV=production
      - API_SECRET=${API_SECRET:?Set API_SECRET in stack environment}

  worker:
    image: ghcr.io/sidcom-ab/pixelcoder-worker:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-pixelcoder}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in stack environment}
      - NODE_ENV=production

volumes:
  pgdata:
